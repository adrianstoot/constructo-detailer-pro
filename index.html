<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConstructoPro Máster - CTE 2026</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; background: #0a0a0a; color: #fff; font-family: sans-serif; }
    * { box-sizing: border-box; }
    @media print {
      .no-print { display: none !important; }
      .print-only { display: block !important; }
    }
    .print-only { display: none; }
  </style>
</head>
<body>
  <div id="root"><div style="color:white;padding:20px">Cargando app...</div></div>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.getElementById('root').innerHTML = '<pre style="color:red;padding:20px">Runtime Error: ' + msg + ' at ' + src + ':' + line + '</pre>';
    };
    fetch('./app.js?v=9')
      .then(r => r.text())
      .then(code => {
        const compiled = Babel.transform(code, { presets: ['react'] }).code;
        const fn = new Function('React', 'ReactDOM', 'lucide', 'document', compiled);
        fn(window.React, window.ReactDOM, window.lucide, document);
      })
      .catch(err => {
        document.getElementById('root').innerHTML = '<pre style="color:red;padding:20px">Error: ' + err.message + '</pre>';
      });
  </script>
</body>
</html>
