<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConstructoPro Máster - CTE 2026</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; background: #0a0a0a; color: #fff; font-family: sans-serif; }
    * { box-sizing: border-box; }
    @media print {
      .no-print { display: none !important; }
      .print-only { display: block !important; }
    }
    .print-only { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    fetch('./app.js?v=10')
      .then(r => r.text())
      .then(code => {
        try {
          const compiled = Babel.transform(code, { presets: ['react'] }).code;
          const fn = new Function('React', 'ReactDOM', 'lucide', 'document', compiled);
          fn(window.React, window.ReactDOM, window.lucide, document);
        } catch(e) {
          document.getElementById('root').innerHTML = '<pre style="color:red;padding:20px">Error: ' + e.message + '</pre>';
        }
      })
      .catch(err => {
        document.getElementById('root').innerHTML = '<pre style="color:red;padding:20px">Fetch: ' + err.message + '</pre>';
      });
  </script>
</body>
</html>
